<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Stress Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Lato', sans-serif;
            background-color: #e8e0d5;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 18px 50px;
        }
        .logo-circle {
            width: 70px; height: 70px; border-radius: 50%;
            border: 2px solid #5a7a5a;
            display: flex; align-items: center; justify-content: center;
            background: #f5f0ea; font-size: 28px;
        }
        .nav-links { display: flex; gap: 40px; }
        .nav-links a {
            text-decoration: none; color: #3a3a3a;
            font-size: 15px; transition: color 0.3s;
        }
        .nav-links a:hover { color: #5a7a5a; }

        .main-content {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            min-height: calc(100vh - 110px);
            position: relative; z-index: 2;
        }

        .card {
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.8);
            border-radius: 8px;
            padding: 40px 50px;
            width: 400px;
            text-align: center;
        }
        .card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 24px; color: #3a3a3a; margin-bottom: 6px;
        }
        .card p { font-size: 13px; color: #666; margin-bottom: 28px; }

        .input-group { margin-bottom: 16px; text-align: left; }
        .input-group label {
            display: block; font-size: 11px;
            letter-spacing: 1px; color: #555;
            margin-bottom: 6px; text-transform: uppercase;
        }
        .input-group input {
            width: 100%; padding: 11px 14px;
            border: 1.5px solid #c8c0b5;
            background: rgba(255,255,255,0.7);
            border-radius: 4px; font-size: 14px;
            font-family: 'Lato', sans-serif;
            outline: none; transition: border-color 0.3s;
        }
        .input-group input:focus { border-color: #3a6bc4; }

        .btn-register {
            width: 100%; padding: 13px;
            background: #3a6bc4; color: white;
            font-size: 14px; letter-spacing: 1px;
            cursor: pointer; border: none;
            border-radius: 4px; transition: all 0.3s;
            font-family: 'Lato', sans-serif; margin-top: 8px;
        }
        .btn-register:hover { background: #2a5ab4; }

        .divider {
            margin: 18px 0; font-size: 12px;
            color: #888; text-align: center;
        }

        .btn-login-link {
            width: 100%; padding: 11px;
            border: 1.5px solid #8a8a8a;
            background: transparent; color: #3a3a3a;
            font-size: 14px; letter-spacing: 1px;
            cursor: pointer; border-radius: 4px;
            transition: all 0.3s; font-family: 'Lato', sans-serif;
            text-decoration: none; display: block; text-align: center;
        }
        .btn-login-link:hover { background: #3a3a3a; color: white; }

        .error-msg {
            background: #ffe0e0; color: #c00;
            padding: 10px; border-radius: 4px;
            font-size: 13px; margin-bottom: 16px;
        }
        .success-msg {
            background: #e0ffe0; color: #060;
            padding: 10px; border-radius: 4px;
            font-size: 13px; margin-bottom: 16px;
        }

        /* Leaves */
        .leaves { position: fixed; bottom: 0; pointer-events: none; z-index: 1; }
        .leaves-left { left: 0; }
        .leaves-right { right: 0; }
        .leaves svg { width: 280px; height: 360px; }
    </style>
</head>
<body>
    <nav>
        <div class="logo-circle">🪷</div>
        <div class="nav-links">
            <a href="/">HOME</a>
            <a href="/accuracy">Accuracy Graph</a>
        </div>
    </nav>

    <div class="main-content">
        <div class="card">
            <h2>Create Account</h2>
            <p>Enter your Credentials</p>

            {% if error %}
            <div class="error-msg">⚠️ {{ error }}</div>
            {% endif %}
            {% if success %}
            <div class="success-msg">✅ {{ success }}</div>
            {% endif %}
            
            

            <form method="POST">
                <div class="input-group">
                    <label>Username</label>
                    <input type="text" name="username" placeholder="Enter username" required minlength="3">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Create strong password" required minlength="4">
                </div>
                <div class="input-group">
                    <label>Confirm Password</label>
                    <input type="password" name="confirm_password" placeholder="Re-enter your password" required>
                </div>
                <button type="submit" class="btn-register"> Register here</button>
            </form>

            <div class="divider">— or —</div>
            <a href="/login" class="btn-login-link">Already have a account? Login here</a>
        </div>
    </div>

    <!-- Leaves Left -->
    <div class="leaves leaves-left">
        <svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg" fill="none">
            <g stroke="#4a6a4a" stroke-width="1.5" opacity="0.7">
                <path d="M50 400 Q80 300 120 200 Q150 120 180 60" stroke-width="2"/>
                <ellipse cx="90" cy="320" rx="35" ry="12" transform="rotate(-30 90 320)" fill="#6a8a6a" fill-opacity="0.3"/>
                <ellipse cx="110" cy="270" rx="38" ry="13" transform="rotate(-50 110 270)" fill="#6a8a6a" fill-opacity="0.3"/>
                <ellipse cx="135" cy="220" rx="32" ry="11" transform="rotate(-20 135 220)" fill="#6a8a6a" fill-opacity="0.3"/>
                <ellipse cx="70" cy="350" rx="28" ry="10" transform="rotate(-60 70 350)" fill="#6a8a6a" fill-opacity="0.3"/>
                <path d="M20 400 Q40 320 60 240 Q80 160 100 80" stroke-width="1.5"/>
                <ellipse cx="45" cy="340" rx="30" ry="10" transform="rotate(-70 45 340)" fill="#6a8a6a" fill-opacity="0.25"/>
                <ellipse cx="60" cy="280" rx="32" ry="11" transform="rotate(-45 60 280)" fill="#6a8a6a" fill-opacity="0.25"/>
            </g>
        </svg>
    </div>
    <!-- Leaves Right -->
    <div class="leaves leaves-right">
        <svg viewBox="0 0 300 400" xmlns="http://www.w3.org/2000/svg" fill="none">
            <g stroke="#4a6a4a" stroke-width="1.5" opacity="0.7">
                <path d="M250 400 Q220 300 180 200 Q150 120 120 60" stroke-width="2"/>
                <ellipse cx="210" cy="320" rx="35" ry="12" transform="rotate(30 210 320)" fill="#6a8a6a" fill-opacity="0.3"/>
                <ellipse cx="190" cy="270" rx="38" ry="13" transform="rotate(50 190 270)" fill="#6a8a6a" fill-opacity="0.3"/>
                <ellipse cx="165" cy="220" rx="32" ry="11" transform="rotate(20 165 220)" fill="#6a8a6a" fill-opacity="0.3"/>
                <ellipse cx="230" cy="350" rx="28" ry="10" transform="rotate(60 230 350)" fill="#6a8a6a" fill-opacity="0.3"/>
                <path d="M280 400 Q260 320 240 240 Q220 160 200 80" stroke-width="1.5"/>
                <ellipse cx="255" cy="340" rx="30" ry="10" transform="rotate(70 255 340)" fill="#6a8a6a" fill-opacity="0.25"/>
                <ellipse cx="240" cy="280" rx="32" ry="11" transform="rotate(45 240 280)" fill="#6a8a6a" fill-opacity="0.25"/>
            </g>
        </svg>
    </div>
</body>
</html>
